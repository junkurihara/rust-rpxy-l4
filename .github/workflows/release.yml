name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rpxy-l4

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            archive_name: rpxy-l4-x86_64-unknown-linux-musl

          - target: aarch64-unknown-linux-musl
            archive_name: rpxy-l4-aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} --bin ${{ env.BINARY_NAME }}

      - name: Package binary
        run: |
          mkdir -p /tmp/assets
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} /tmp/${{ env.BINARY_NAME }}
          tar -czf /tmp/assets/${{ matrix.archive_name }}.tar.gz \
            -C /tmp ${{ env.BINARY_NAME }}
          echo "Archive contents:"
          tar -tzf /tmp/assets/${{ matrix.archive_name }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: /tmp/assets/${{ matrix.archive_name }}.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/assets
          merge-multiple: true

      - name: List assets
        run: ls -lha /tmp/assets/

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/assets/*.tar.gz
          name: ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
