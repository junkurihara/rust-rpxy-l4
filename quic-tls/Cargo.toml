[package]
name = "rpxy-l4-quic-tls"
description = "Library to probe TLS and QUIC initial packets"
version.workspace = true
edition.workspace = true
readme.workspace = true
repository.workspace = true
homepage.workspace = true
categories.workspace = true
publish.workspace = true

[dependencies]
# traces and logs
tracing = { version = "0.1.44" }

# error handling
anyhow = { version = "1.0.102" }
thiserror = { version = "2.0.18" }

# quic parser
hkdf = { version = "0.12.4" }
sha2 = { version = "0.10.9" }
aes = { version = "0.8.4" }
aes-gcm = { version = "0.10.3" }
hex-literal = { version = "1.1.0" }

# ech
bytes = { version = "1.11.1" }
rand = { version = "0.10.0" }
# hpke = { version = "0.13.0" }
# Use a specific commit of hpke until for rand-0.10 compatibility
hpke = { git = "https://github.com/junkurihara/rust-hpke.git", rev = "59cfaa6cabcdbb357ef67d1d6364ad4c72c91fa9" }
base64 = { version = "0.22.1" }

[dev-dependencies]
rustls = { version = "0.23.36" }
